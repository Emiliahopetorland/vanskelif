<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Aksje Tracker</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f1117;
      color: #e0e0e0;
      min-height: 100vh;
      padding: 30px 20px;
    }

    h1 {
      text-align: center;
      font-size: 2rem;
      margin-bottom: 8px;
      color: #ffffff;
    }

    .subtitle {
      text-align: center;
      color: #888;
      margin-bottom: 30px;
      font-size: 0.9rem;
    }

    .search-bar {
      display: flex;
      gap: 10px;
      max-width: 500px;
      margin: 0 auto 30px;
    }

    input {
      flex: 1;
      padding: 12px 16px;
      border-radius: 8px;
      border: 1px solid #333;
      background: #1c1f2e;
      color: #fff;
      font-size: 1rem;
    }

    input::placeholder { color: #555; }

    button {
      padding: 12px 20px;
      background: #4f8ef7;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1rem;
      transition: background 0.2s;
    }

    button:hover { background: #3a7de0; }

    #error-msg {
      text-align: center;
      color: #ff6b6b;
      margin-bottom: 16px;
      min-height: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 16px;
      max-width: 1000px;
      margin: 0 auto;
    }

    .card {
      background: #1c1f2e;
      border-radius: 12px;
      padding: 20px;
      border: 1px solid #2a2d3e;
      position: relative;
    }

    .card .ticker {
      font-size: 1.3rem;
      font-weight: bold;
      color: #fff;
    }

    .card .name {
      font-size: 0.8rem;
      color: #888;
      margin-bottom: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card .price {
      font-size: 1.6rem;
      font-weight: bold;
      color: #ffffff;
    }

    .card .change {
      font-size: 0.95rem;
      margin-top: 4px;
    }

    .up { color: #4caf50; }
    .down { color: #f44336; }

    .remove-btn {
      position: absolute;
      top: 10px;
      right: 12px;
      background: transparent;
      color: #555;
      border: none;
      font-size: 1.1rem;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 4px;
    }

    .remove-btn:hover { color: #f44336; background: transparent; }

    .loading { color: #888; font-size: 0.85rem; }

    .default-hint {
      text-align: center;
      color: #444;
      margin-top: 40px;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>

<h1>📈 Aksje Tracker</h1>
<p class="subtitle">Søk etter aksjeticker (f.eks. AAPL, TSLA, EQNR.OL)</p>

<div class="search-bar">
  <input type="text" id="tickerInput" placeholder="Skriv inn ticker, f.eks. AAPL" />
  <button onclick="addStock()">Legg til</button>
</div>

<div id="error-msg"></div>
<div class="grid" id="stockGrid"></div>
<p class="default-hint" id="hint">Ingen aksjer lagt til ennå. Prøv AAPL, TSLA eller EQNR.OL!</p>

<script>
  const stocks = [];

  async function addStock() {
    const input = document.getElementById('tickerInput');
    const ticker = input.value.trim().toUpperCase();
    const errEl = document.getElementById('error-msg');
    errEl.textContent = '';

    if (!ticker) return;
    if (stocks.includes(ticker)) {
      errEl.textContent = ticker + ' er allerede lagt til.';
      return;
    }

    stocks.push(ticker);
    input.value = '';
    document.getElementById('hint').style.display = 'none';
    renderCard(ticker, null);
    await fetchStock(ticker);
  }

  function renderCard(ticker, data) {
    const grid = document.getElementById('stockGrid');
    let card = document.getElementById('card-' + ticker);

    if (!card) {
      card = document.createElement('div');
      card.className = 'card';
      card.id = 'card-' + ticker;
      grid.appendChild(card);
    }

    if (!data) {
      card.innerHTML = `
        <button class="remove-btn" onclick="removeStock('${ticker}')">✕</button>
        <div class="ticker">${ticker}</div>
        <div class="name loading">Laster...</div>
        <div class="price">—</div>`;
      return;
    }

    if (data.error) {
      card.innerHTML = `
        <button class="remove-btn" onclick="removeStock('${ticker}')">✕</button>
        <div class="ticker">${ticker}</div>
        <div class="name" style="color:#f44336">Ikke funnet</div>
        <div class="price" style="font-size:1rem;color:#888">Sjekk ticker</div>`;
      return;
    }

    const changeClass = data.change >= 0 ? 'up' : 'down';
    const changeSign = data.change >= 0 ? '+' : '';
    card.innerHTML = `
      <button class="remove-btn" onclick="removeStock('${ticker}')">✕</button>
      <div class="ticker">${ticker}</div>
      <div class="name">${data.name}</div>
      <div class="price">$${data.price.toFixed(2)}</div>
      <div class="change ${changeClass}">${changeSign}${data.change.toFixed(2)} (${changeSign}${data.changePct.toFixed(2)}%)</div>`;
  }

  async function fetchStock(ticker) {
    try {
      const url = `https://query1.finance.yahoo.com/v8/finance/chart/${ticker}?interval=1d&range=1d`;
      const res = await fetch(url);
      const json = await res.json();
      const meta = json?.chart?.result?.[0]?.meta;

      if (!meta) {
        renderCard(ticker, { error: true });
        return;
      }

      const price = meta.regularMarketPrice;
      const prevClose = meta.chartPreviousClose || meta.previousClose;
      const change = price - prevClose;
      const changePct = (change / prevClose) * 100;
      const name = meta.longName || meta.shortName || ticker;

      renderCard(ticker, { price, change, changePct, name });
    } catch (e) {
      renderCard(ticker, { error: true });
    }
  }

  function removeStock(ticker) {
    const idx = stocks.indexOf(ticker);
    if (idx > -1) stocks.splice(idx, 1);
    const card = document.getElementById('card-' + ticker);
    if (card) card.remove();
    if (stocks.length === 0) document.getElementById('hint').style.display = 'block';
  }

  // Enter-tast støtte
  document.getElementById('tickerInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') addStock();
  });
</script>

</body>
</html>
