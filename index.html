  <title>Aksje Tracker</title>

    body {

    .search-bar { display: flex; gap: 10px; max-width: 500px; margin: 0 auto 30px; }
    input {
      flex: 1; padding: 12px 16px; border-radius: 8px;
      border: 1px solid #333; background: #1c1f2e; color: #fff; font-size: 1rem;

    input::placeholder { color: #555; }
    button {
      padding: 12px 20px; background: #4f8ef7; color: white;
      border: none; border-radius: 8px; cursor: pointer; font-size: 1rem;

    #error-msg { text-align: center; color: #ff6b6b; margin-bottom: 16px; min-height: 20px; }

      max-width: 1000px; margin: 0 auto 12px;
      font-size: 0.85rem; color: #555;
      text-transform: uppercase; letter-spacing: 0.08em;
    }
    .grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 16px; max-width: 1000px; margin: 0 auto 30px;
    }
